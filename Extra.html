<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Instagram Profile UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #fff;
            color: #000;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 40px;
            border-bottom: 1px solid #dbdbdb;
        }

        .logo {
            font-family: 'Brush Script MT', cursive;
            font-size: 32px;
        }

        .auth {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .login {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .signup {
            text-decoration: none;
            color: #4f46e5;
            font-weight: bold;
        }

        /* Profile */
        .profile-container {
            display: flex;
            align-items: center;
            gap: 80px;
            padding: 60px 120px;
        }

        .profile-pic img {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-info {
            max-width: 500px;
        }

        .username {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .username h2 {
            font-size: 26px;
            font-weight: normal;
        }

        .verified {
            color: #1d9bf0;
            font-size: 18px;
        }

        .name {
            margin: 8px 0;
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 25px;
            margin: 14px 0;
            font-size: 16px;
        }

        .bio {
            font-size: 15px;
        }

        /* Posts Grid */
        .posts-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            padding: 20px 120px;
        }

        .post {
            position: relative;
            cursor: pointer;
        }

        .post img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        /* Overlay */
        .post-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: 0.3s ease;
        }

        .post:hover .post-overlay {
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="navbar">
        <div class="logo">Instagram</div>
        <div class="auth">
            <button class="login">Log In</button>
            <a href="#" class="signup">Sign Up</a>
        </div>
    </header>

    <!-- Profile Section -->
    <div class="profile-container">
        <div class="profile-pic">
            <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c" alt="profile">
        </div>

        <div class="profile-info">
            <div class="username">
                <h2>microsoft</h2>
                <span class="verified">✔</span>
            </div>

            <h4 class="name">Microsoft</h4>

            <div class="stats">
                <span><b>1,289</b> posts</span>
                <span><b>4.5M</b> followers</span>
                <span><b>301</b> following</span>
            </div>

            <p class="bio">ooo through 1/5 ✌️</p>
        </div>
    </div>
    <!-- Posts Section -->
    <div class="posts-container">

        <div class="post">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" alt="">
            <div class="post-overlay">
                <span>❤️ 8,200</span>
                <span>💬 410</span>
            </div>
        </div>

        <div class="post">
            <img src="https://images.unsplash.com/photo-1603791440384-56cd371ee9a7" alt="">
            <div class="post-overlay">
                <span>❤️ 7,600</span>
                <span>💬 380</span>
            </div>
        </div>

        <div class="post">
            <img src="https://images.unsplash.com/photo-1593642634443-44adaa06623a" alt="">
            <div class="post-overlay">
                <span>❤️ 6,900</span>
                <span>💬 295</span>
            </div>
        </div>

    </div>

</body>

</html>
